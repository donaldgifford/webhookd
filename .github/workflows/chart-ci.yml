---
name: Chart CI

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - "ct.yaml"
      - ".github/workflows/chart-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: helm lint
        run: helm lint charts/webhookd -f charts/webhookd/ci/ci-values.yaml

  unittest:
    name: helm-unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Run helm-unittest
        uses: helm-unittest/helm-unittest-action@v2
        with:
          file: "tests/*_test.yaml"
          charts: charts/webhookd

  ct:
    name: chart-testing (lint + install on kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2
        with:
          version: v3.14.0

      - name: Run ct list-changed
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ct lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1
        with:
          version: v0.27.0
          kubectl_version: v1.31.4

      - name: Pre-create CRD + target namespace
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          kubectl create namespace ct-target
          kubectl apply -f deploy/crds/samlgroupmapping.yaml

      - name: Run ct install
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml

  docs-drift:
    name: helm-docs drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run helm-docs and check for drift
        uses: losisin/helm-docs-github-action@v1
        with:
          chart-search-root: charts
          fail-on-diff: true
