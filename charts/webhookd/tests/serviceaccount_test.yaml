suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
release:
  name: webhookd
  namespace: webhookd
set:
  jsm.crIdentityProviderID: ci-test-idp
  signing.createSecret: true
  signing.secret: ci-test-secret
tests:
  - it: rendered by default with the chart-derived name
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: webhookd
      - equal:
          path: metadata.namespace
          value: webhookd

  - it: serviceAccount.create=false skips rendering
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: serviceAccount.name override is honored
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: serviceAccount.annotations propagate
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/webhookd
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::000000000000:role/webhookd
