suite: secret
templates:
  - templates/secret.yaml
release:
  name: webhookd
  namespace: webhookd
tests:
  - it: signing.createSecret=true renders Secret with base64-encoded webhookSecret
    set:
      signing.createSecret: true
      signing.secret: topsecret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: webhookd-signing
      - equal:
          path: type
          value: Opaque
      - equal:
          path: data.webhookSecret
          value: dG9wc2VjcmV0
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: signing.createSecret=false skips rendering
    set:
      signing.createSecret: false
    asserts:
      - hasDocuments:
          count: 0

  - it: signing.createSecret=true + signing.secret empty fails templating
    set:
      signing.createSecret: true
      signing.secret: ""
    asserts:
      - failedTemplate:
          errorMessage: "signing.secret is required when signing.createSecret=true"
