apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: webhookmappings.demo.webhookd.io
spec:
  group: demo.webhookd.io
  scope: Namespaced
  names:
    kind: WebhookMapping
    listKind: WebhookMappingList
    plural: webhookmappings
    singular: webhookmapping
    shortNames: [wm]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                identityProviderID:
                  type: string
                role:
                  type: string
                project:
                  type: string
              required: [identityProviderID, role, project]
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                      observedGeneration:
                        type: integer
                    required: [type, status, lastTransitionTime]
      subresources:
        status: {}
