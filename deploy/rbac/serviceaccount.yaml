#
# DEPLOY/RBAC IS A TEST FIXTURE, NOT THE PRODUCTION INSTALL PATH.
# Production installs use the Helm chart at charts/webhookd/.
# These manifests are kept around because the integration tests
# load them directly via kustomize.
#
# ServiceAccount the webhookd Pod runs as. The Role + RoleBinding
# below grant only the verbs the executor needs (get, list, watch,
# patch on SAMLGroupMapping); a future ref-validation middleware
# would extend this with `get` on Project / UserRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhookd
  namespace: webhookd
