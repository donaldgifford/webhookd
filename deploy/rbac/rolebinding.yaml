#
# Binds the Role above to webhookd's ServiceAccount across namespace
# boundaries: the SA lives in `webhookd`, the Role lives in
# `wiz-operator` (where the CRs are applied). The cross-namespace
# binding is fine — Kubernetes resolves the subject's namespace at
# auth time.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhookd
  namespace: wiz-operator
subjects:
  - kind: ServiceAccount
    name: webhookd
    namespace: webhookd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: webhookd
